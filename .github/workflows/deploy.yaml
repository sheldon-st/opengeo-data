name: Build & Deploy Backend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Helm chart to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: helm/opengeo-data/
          target: ~/opengeo-data/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # Ensure namespace exists
            kubectl create namespace opengeo --dry-run=client -o yaml | kubectl apply -f -

            # Ensure GHCR image pull secret exists in the opengeo namespace
            kubectl create secret docker-registry ghcr-credentials \
              --namespace opengeo \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${GHCR_TOKEN} \
              --dry-run=client -o yaml | kubectl apply -f -

            # Clean up any stale manual secrets from previous setup
            kubectl delete secret opengeo-data-secrets -n opengeo --ignore-not-found

            helm upgrade --install opengeo-data ~/opengeo-data/helm/opengeo-data \
              --namespace opengeo \
              --set image.repository=ghcr.io/${{ github.repository }} \
              --set image.tag=${{ needs.build.outputs.image_tag }} \
              --set imagePullSecrets[0].name=ghcr-credentials \
              --wait --timeout 300s
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
