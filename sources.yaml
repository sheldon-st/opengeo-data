  # ArcGIS Hub (group-based)
  - key: usdot-hub
    name: "USDOT BTS Hub Datasets"
    type: arcgis-hub
    url: "https://hub.arcgis.com"
    organization: "USDOT BTS"
    schedule: "0 3 * * *"
    config:
      groups:
        - 02d8126dfe59497a8a0771ea8f8807ff
        - 4700230195de47569ad913b9d495b12f
      limit: 200
  # ArcGIS Portal Group Search
  - key: fema-portal
    name: "FEMA ArcGIS Portal Group"
    type: arcgis-portal-group
    url: "https://fema.maps.arcgis.com/sharing/rest/content/groups/a4ad974fc3664a5ebfdf2ac3fb578ffc/search"
    organization: "FEMA"
    schedule: "0 3 * * *"
    config:
      num: 100

