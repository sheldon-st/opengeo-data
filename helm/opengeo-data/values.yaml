replicaCount: 1

image:
  repository: ghcr.io/OWNER/opengeo-data
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 3000
  nodePort: 30081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: opengeo.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  LOG_LEVEL: info
  CORS_ORIGIN: "*"
  HARVEST_CONCURRENCY: "3"

# To use an external database instead of the bundled PostgreSQL,
# set postgresql.enabled=false and provide a secret name here.
existingSecret: ""

postgresql:
  enabled: true
  database: opengeo
  username: opengeo
  password: ""  # Auto-generated if empty (kept via helm.sh/resource-policy: keep)
  storage: 5Gi

migrate:
  enabled: true

harvester:
  enabled: true
  schedule: "0 2 * * *"

nodeSelector: {}
tolerations: []
affinity: {}
