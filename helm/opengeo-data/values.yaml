replicaCount: 1

image:
  repository: ghcr.io/OWNER/opengeo-data
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 3000
  nodePort: 30081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: opengeo.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  LOG_LEVEL: info
  CORS_ORIGIN: "*"
  HARVEST_CONCURRENCY: "3"

# Reference an existing secret for sensitive values
# The secret should contain: DATABASE_URL
existingSecret: opengeo-data-secrets

postgresql:
  # Set to true to deploy a PostgreSQL instance via this chart
  # For production, use an external database and set DATABASE_URL in the secret
  enabled: false

migrate:
  enabled: true

harvester:
  enabled: true
  schedule: "0 2 * * *"

nodeSelector: {}
tolerations: []
affinity: {}
