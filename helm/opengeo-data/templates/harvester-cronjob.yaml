{{- if .Values.harvester.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "opengeo-data.fullname" . }}-harvester
  labels:
    {{- include "opengeo-data.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.harvester.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "opengeo-data.selectorLabels" . | nindent 12 }}
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: Never
          containers:
            - name: harvester
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["node", "dist/harvester/run.js", "--all"]
              env:
                - name: NODE_ENV
                  value: production
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.existingSecret }}
                      key: DATABASE_URL
                {{- range $key, $value := .Values.env }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
{{- end }}
