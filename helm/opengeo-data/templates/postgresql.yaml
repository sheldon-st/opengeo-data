{{- if .Values.postgresql.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "opengeo-data.fullname" . }}-postgresql
  labels:
    {{- include "opengeo-data.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage | default "5Gi" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opengeo-data.fullname" . }}-postgresql
  labels:
    {{- include "opengeo-data.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "opengeo-data.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "opengeo-data.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | default "opengeo" }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | default "opengeo" }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "opengeo-data.databaseSecretName" . }}
                  key: PG_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | default "opengeo" | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | default "opengeo" | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "opengeo-data.fullname" . }}-postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengeo-data.fullname" . }}-postgresql
  labels:
    {{- include "opengeo-data.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "opengeo-data.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
